; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = tinyGS
data_dir = tinyGS/data
; Exclude the native test environment from the default build/upload/monitor
; targets so the PlatformIO IDE buttons always address real hardware envs.
default_envs = ESP32, ESP32-S3, ESP32-S3-USB, ESP32-C3, ESP32-LILYGO_SX1280

[env]
build_flags = 
	!python git_rev_macro.py
	-DCORE_DEBUG_LEVEL=0
	-DARDUINOJSON_USE_LONG_LONG=1
	-DLOG_BUILD_LEVEL=0
	-flto
build_unflags = -fno-lto
lib_deps = 
	improv/Improv @ 1.2.5
	;jgromes/RadioLib @ 7.6.0
    https://github.com/G4lile0/RadioLib.git
	https://github.com/gmag11/EthWiFiManager.git
	bblanchon/ArduinoJson @ 6.19.4
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays @ 4.6.2
	https://github.com/tinygs/AioP13.git
monitor_speed = 115200
upload_speed = 921600

[base_esp32]
platform = espressif32 @ 6.10.0
framework = arduino
board_build.flash_mode = dio
board_build.partitions = tinygs_4M_partition_table.csv

[base_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board_build.mcu = esp32s3
framework = arduino
build_flags = 
	${env.build_flags}
	-DNETWORK_EVENTS_MUTEX
build_unflags = -flto
board_build.partitions = tinygs_4M_partition_table.csv

[base_esp32c3]
platform = espressif32 @ 6.10.0
framework = arduino
board_build.partitions = tinygs_4M_partition_table.csv

[base_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
build_flags = 
	${env.build_flags}
board_build.partitions = tinygs_4M_partition_table.csv

[env:ESP32]
extends = base_esp32
board = heltec_wifi_lora_32

[env:ESP32-S3]
extends = base_esp32s3
board = heltec_wifi_lora_32_V3
monitor_rts = 0
monitor_dtr = 0

[env:ESP32-S3-USB]
extends = base_esp32s3
board = heltec_wifi_lora_32_V3
build_flags = 
	${base_esp32s3.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_rts = 0
monitor_dtr = 0

[env:ESP32-C3]
extends = base_esp32c3
board = esp32-c3-devkitm-1

[env:ESP32-C6]
extends = base_esp32c6
board = esp32-c6-devkitm-1
build_flags =
	${env.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
monitor_rts = 0
monitor_dtr = 0

[env:ESP32-LILYGO_SX1280]
extends = base_esp32s3
board = lilygo-t3-s3
build_flags = 
	${base_esp32s3.build_flags}
	-DBOARD_HAS_PSRAM

; ── Native unit tests (runs on PC, no hardware needed) ───────────────────────
[env:native]
platform = native
test_framework = unity
build_flags =
	-std=c++17
	-Wall
lib_deps = throwtheswitch/Unity @ ^2.6.1
